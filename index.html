<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>板倉専用ビュー</title>

<style>
body {
  margin: 0;
  background: #0f1419;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
}

.header {
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
  text-align: center;
  background: #161b22;
  border-bottom: 1px solid #222;
}

.timeline {
  padding: 15px;
}

.post {
  background: #161b22;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 12px;
  line-height: 1.5;
  font-size: 15px;
}
</style>
</head>
<body>

<div class="header">
  板倉さん専用タイムライン
</div>

<div class="timeline" id="timeline">
  読み込み中…
</div>

<script>
async function loadFeed() {
  const rssUrl = "https://rsshub.app/twitter/user/itazuratoshiyuk";
  const apiUrl = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssUrl);

  try {
    const res = await fetch(apiUrl);
    const data = await res.json();

    const container = document.getElementById("timeline");
    container.innerHTML = "";

    data.items.slice(0, 10).forEach(item => {
      const div = document.createElement("div");
      div.className = "post";
      div.innerText = item.title;
      container.appendChild(div);
    });

  } catch (error) {
    document.getElementById("timeline").innerText = "取得できませんでした。";
  }
}

loadFeed();
</script>

</body>
</html>
